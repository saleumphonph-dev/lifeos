<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>LifeOS</title>
    <script type="text/javascript">
      // SPA redirect trick for GitHub Pages — rewrites the path into a query
      // string, then index.html restores it. Segment count must match the
      // depth of the base path: 1 for /<repo>/, 0 for user/org pages.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
